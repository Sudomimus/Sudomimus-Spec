openapi: 3.1.0
info:
  title: Sudomimus Connect
  version: 0.2.0
  summary: Token exchange API for the Sudomimus authentication platform.
  description: |
    The Connect API is the public entry point for integrating applications.
    Clients use it to establish an authentication inquiry, poll its status,
    redeem the realized inquiry for application tokens, refresh access
    tokens, and fetch localized application metadata. Applications can also
    introspect whether a session is still valid and revoke sessions — a single
    session via /logout, or every session of an account via /revoke-all.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://connect-api.sudomimus.com
    description: Production
# Default: no HTTP-level auth. Endpoints other than /establish carry their
# credentials (inquiry / refresh tokens) in the request body. /establish
# overrides this with the SudomimusClientJWT scheme.
security: []
paths:
  /health:
    get:
      operationId: health
      summary: Liveness probe for the Connect service.
      responses:
        "200":
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /establish:
    post:
      operationId: establish
      summary: Establish a new authentication inquiry for an application.
      description: |
        Creates a new authentication inquiry under the calling application.

        The request MUST carry a client-auth JWT in the `Authorization` header
        using the `SudomimusClientJWT` scheme. The JWT binds the request body
        bytes via a `body_sha256` claim and carries a single-use `jti` to
        prevent replay. See the `SudomimusClientJWT` security scheme below
        for the full claim contract.

        All three narrowing fields (`authenticationConstraints`,
        `realizeConstraints`, `returnMethods`) are optional. When absent the
        inquiry imposes no per-inquiry narrowing on that layer. When present
        the array MUST be non-empty — an empty array is explicitly rejected
        with HTTP 400.
      security:
        - SudomimusClientJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstablishRequest"
      responses:
        "200":
          description: Inquiry established.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishResponse"
        "401":
          description: Client-auth JWT missing, malformed, expired, or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /status-poll:
    post:
      operationId: statusPoll
      summary: Poll the realization status of an authentication inquiry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusPollRequest"
      responses:
        "200":
          description: Current status of the inquiry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusPollResponse"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /redeem:
    post:
      operationId: redeem
      summary: Redeem a realized inquiry for an application token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemRequest"
      responses:
        "200":
          description: Tokens issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemResponse"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /refresh:
    post:
      operationId: refresh
      summary: Issue a new access token from a refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: Access token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /info:
    post:
      operationId: info
      summary: Fetch localized public metadata about an application.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InfoRequest"
      responses:
        "200":
          description: Application metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /introspect:
    post:
      operationId: introspect
      summary: Check whether the session behind an access token is still valid.
      description: |
        Returns the revocation status of the refresh token (session) that the
        supplied access token descends from. Intended for strict applications
        that want near-real-time revocation: validate the access token offline
        as usual, then call this endpoint — caching the result for at least
        `recommendedRecheckSeconds` — to decide whether to keep trusting it.

        The access token is self-authenticating: its signature is verified
        against the issuing application's public key, so no client-auth JWT is
        required. The access token's own expiry is NOT enforced here; the answer
        describes the underlying session, not the access token's freshness.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntrospectRequest"
      responses:
        "200":
          description: Status of the session behind the access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectResponse"
        "401":
          description: Access token missing, malformed, or with an invalid signature.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /logout:
    post:
      operationId: logout
      summary: Revoke the session behind a refresh token.
      description: |
        Revokes the single session identified by the supplied refresh token
        (RFC 7009 style). Possession of a genuine refresh token authorizes the
        revocation, so no client-auth JWT is required.

        The operation is idempotent: a token that is already revoked or expired
        reports `revoked: true`, and a token that cannot be resolved reports
        `revoked: false` without revealing whether it ever existed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Revocation outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /revoke-all:
    post:
      operationId: revokeAll
      summary: Revoke every session of an account for the calling application.
      description: |
        Revokes all refresh tokens belonging to the given account that were
        issued for the calling application (log out everywhere). This is an
        application-authority action — not something a single session capability
        can authorize — so it requires a client-auth JWT, exactly like
        /establish. Revocation is scoped to the calling application; sessions of
        the same account under other applications are unaffected.
      security:
        - SudomimusClientJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeAllRequest"
      responses:
        "200":
          description: Number of sessions revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeAllResponse"
        "401":
          description: Client-auth JWT missing, malformed, expired, or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    SudomimusClientJWT:
      type: http
      scheme: SudomimusClientJWT
      description: |
        Client-auth JWT carried via `Authorization: SudomimusClientJWT <jwt>`.

        The JWT MUST be signed (RS256) with the application's client-auth
        private key (paired public key registered server-side at application
        creation). Required body claims:

        - `iss`: the application anchor (must match `applicationAnchor` in
          the request body).
        - `aud`: literal string `"sudomimus-connect"`.
        - `iat`: UNIX seconds. Future-dated claims are tolerated up to a
          30-second clock skew.
        - `exp`: UNIX seconds. Lifetime (`exp - iat`) MUST be at most 60.
        - `jti`: per-request unique identifier (UUID v4 recommended). Replay
          is detected atomically server-side; the same `jti` is honored
          exactly once.
        - `body_sha256`: standard base64 of `SHA-256(rawHttpBody)` where the
          input is the UTF-8 bytes of the exact JSON body sent on the wire.
  schemas:
    HealthResponse:
      type: object
      required:
        - ready
        - service
        - version
      properties:
        ready:
          type: boolean
        service:
          type: string
        version:
          type: string
    EstablishRequest:
      type: object
      required:
        - applicationAnchor
      properties:
        applicationAnchor:
          type: string
          description: Public anchor identifying the integrating application.
        authenticationConstraints:
          type: array
          description: |
            Optional per-inquiry narrowing of the application's
            authentication-rule layer. Absent means no narrowing. If present,
            the array MUST be non-empty; empty arrays are rejected with 400.
          items:
            $ref: "#/components/schemas/AuthenticationRuleConstraint"
        realizeConstraints:
          type: array
          description: |
            Optional per-inquiry narrowing of the application's realize-rule
            layer. Absent means no narrowing. If present, the array MUST be
            non-empty; empty arrays are rejected with 400.
          items:
            $ref: "#/components/schemas/RealizeRuleConstraint"
        returnMethods:
          type: array
          description: |
            Optional per-inquiry return-method declaration. Doubles as the
            concrete delivery info for CALLBACK (carries the callback URL).
            Absent means no per-inquiry narrowing (CALLBACK is unreachable
            for this inquiry because no URL is anchored). If present, the
            array MUST be non-empty; empty arrays are rejected with 400.
          items:
            $ref: "#/components/schemas/ReturnMethodDeclaration"
    EstablishResponse:
      type: object
      required:
        - applicationAnchor
        - exposureKey
        - hiddenKey
      properties:
        applicationAnchor:
          type: string
        exposureKey:
          type: string
          description: Public half of the inquiry key pair; safe to share with the user agent.
        hiddenKey:
          type: string
          description: Private half of the inquiry key pair; must stay on the originating client.
    StatusPollRequest:
      type: object
      required:
        - exposureKey
        - hiddenKey
      properties:
        exposureKey:
          type: string
        hiddenKey:
          type: string
    StatusPollResponse:
      oneOf:
        - $ref: "#/components/schemas/StatusPollPendingResponse"
        - $ref: "#/components/schemas/StatusPollRealizedResponse"
      discriminator:
        propertyName: status
        mapping:
          PENDING: "#/components/schemas/StatusPollPendingResponse"
          REALIZED: "#/components/schemas/StatusPollRealizedResponse"
    StatusPollPendingResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - PENDING
    StatusPollRealizedResponse:
      type: object
      required:
        - status
        - confirmationKey
      properties:
        status:
          type: string
          enum:
            - REALIZED
        confirmationKey:
          type: string
          description: One-time key proving the inquiry has been realized; pass to /redeem.
    RedeemRequest:
      type: object
      required:
        - exposureKey
        - hiddenKey
        - confirmationKey
      properties:
        exposureKey:
          type: string
        hiddenKey:
          type: string
        confirmationKey:
          type: string
    RedeemResponse:
      type: object
      required:
        - applicationAnchor
        - refreshToken
        - accessToken
      properties:
        applicationAnchor:
          type: string
        refreshToken:
          type: string
          description: Long-lived refresh token (JWT).
        accessToken:
          type: string
          description: Short-lived access token (JWT).
    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
    RefreshResponse:
      type: object
      required:
        - accessToken
      properties:
        accessToken:
          type: string
          description: Short-lived access token (JWT). No new refresh token is issued.
    InfoRequest:
      type: object
      required:
        - applicationAnchor
        - locale
      properties:
        applicationAnchor:
          type: string
        locale:
          type: string
          description: IETF BCP 47 locale tag (e.g. "en-US"). Falls back to the application's default locale if not available.
    InfoResponse:
      type: object
      required:
        - applicationAnchor
        - applicationName
        - applicationPublicKey
      properties:
        applicationAnchor:
          type: string
        applicationName:
          type: string
          description: Localized application display name.
        applicationPublicKey:
          type: string
          description: PEM-encoded application public key used to verify issued JWTs.
    IntrospectRequest:
      type: object
      required:
        - accessToken
      properties:
        accessToken:
          type: string
          description: A Sudomimus-issued access token (JWT). Its signature is verified; its own expiry is not enforced.
    IntrospectResponse:
      type: object
      required:
        - status
        - recommendedRecheckSeconds
      properties:
        status:
          type: string
          description: |
            Revocation state of the session behind the access token. `not_found`
            covers an unknown session or one belonging to a different application.
          enum:
            - active
            - revoked
            - expired
            - not_found
        recommendedRecheckSeconds:
          type: integer
          description: Suggested minimum number of seconds to cache this result before re-checking.
    LogoutRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: The refresh token (JWT) whose session should be revoked.
    LogoutResponse:
      type: object
      required:
        - revoked
      properties:
        revoked:
          type: boolean
          description: True if the session is now revoked, including sessions that were already revoked or expired.
    RevokeAllRequest:
      type: object
      required:
        - accountIdentifier
      properties:
        accountIdentifier:
          type: string
          description: Identifier of the account whose sessions should be revoked for the calling application.
    RevokeAllResponse:
      type: object
      required:
        - revokedCount
      properties:
        revokedCount:
          type: integer
          description: Number of refresh tokens that were revoked.
    AuthenticationRuleConstraint:
      type: object
      required:
        - method
        - payload
      properties:
        method:
          type: string
          description: Which authentication method this constraint narrows to.
          enum:
            - PASSKEY
            - EMAIL_VERIFICATION
        payload:
          oneOf:
            - $ref: "#/components/schemas/AuthenticationRulePasskeyPayload"
            - $ref: "#/components/schemas/AuthenticationRuleEmailVerificationPayload"
        accessTokenTtlSeconds:
          type: integer
          description: Per-constraint override for access token lifetime. Resolved at realize time.
        refreshTokenTtlSeconds:
          type: integer
          description: Per-constraint override for refresh token lifetime. Resolved at realize time.
    AuthenticationRulePasskeyPayload:
      type: object
      description: Empty payload — passkey constraints carry no further parameters.
      additionalProperties: false
    AuthenticationRuleEmailVerificationPayload:
      type: object
      description: Empty payload — email-verification constraints carry no further parameters.
      additionalProperties: false
    RealizeRuleConstraint:
      type: object
      required:
        - constraintType
        - payload
      properties:
        constraintType:
          type: string
          description: Which realize-rule kind this constraint narrows to.
          enum:
            - EMAIL
        payload:
          $ref: "#/components/schemas/RealizeRuleEmailPayload"
        accessTokenTtlSeconds:
          type: integer
          description: Per-constraint override for access token lifetime. Resolved at realize time.
        refreshTokenTtlSeconds:
          type: integer
          description: Per-constraint override for refresh token lifetime. Resolved at realize time.
    RealizeRuleEmailPayload:
      type: object
      required:
        - allowedEmails
      properties:
        allowedEmails:
          type: array
          description: |
            List of email addresses or glob patterns the realized identity
            must match. Glob patterns are bounded by server-side limits to
            prevent regex backtracking attacks.
          items:
            type: string
    ReturnMethodDeclaration:
      oneOf:
        - $ref: "#/components/schemas/ReturnMethodCallback"
        - $ref: "#/components/schemas/ReturnMethodStatusPoll"
        - $ref: "#/components/schemas/ReturnMethodReveal"
      discriminator:
        propertyName: type
        mapping:
          CALLBACK: "#/components/schemas/ReturnMethodCallback"
          STATUS_POLL: "#/components/schemas/ReturnMethodStatusPoll"
          REVEAL: "#/components/schemas/ReturnMethodReveal"
    ReturnMethodCallback:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          enum:
            - CALLBACK
        payload:
          type: object
          required:
            - callbackUrl
          properties:
            callbackUrl:
              type: string
              description: |
                Concrete callback URL for this inquiry. The host MUST match
                one of the application's allowed callback domains.
    ReturnMethodStatusPoll:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          enum:
            - STATUS_POLL
        payload:
          type: object
          description: Empty payload — STATUS_POLL carries no per-inquiry parameters.
          additionalProperties: false
    ReturnMethodReveal:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          enum:
            - REVEAL
        payload:
          type: object
          description: Empty payload — REVEAL surfaces tokens directly in the UI.
          additionalProperties: false
    Error:
      type: object
      description: |
        Error response body. The Connect service emits `{ "reason": "<SymbolDescription>" }`
        for known failure modes. When the reason symbol's description begins with
        `PRIVATE`, the body is empty (zero bytes) and only the HTTP status carries
        signal — both `reason` and the body itself are absent in that case.
      properties:
        reason:
          type: string
          description: Stable machine-readable reason code.

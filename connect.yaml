openapi: 3.1.0
info:
  title: Sudomimus Connect
  version: 2.0.0
  summary: Token exchange API for the Sudomimus authentication platform.
  description: |
    The Connect API is the public entry point for integrating applications.
    Clients use it to establish an authentication inquiry, poll its status,
    redeem the realized inquiry for application tokens, and fetch localized
    application metadata.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://connect-api.sudomimus.com
    description: Production
# Default: no HTTP-level auth. Endpoints other than /establish carry their
# credentials (inquiry / refresh tokens) in the request body. /establish
# overrides this with the SudomimusClientJWT scheme.
security: []
paths:
  /health:
    get:
      operationId: health
      summary: Report Connect invocation health and deployment identity.
      responses:
        "200":
          description: |
            The API invocation path is operational and reports the deployed
            service identity. This response does not assert dependency,
            configuration, or business-capability readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /establish:
    post:
      operationId: establish
      summary: Establish a new authentication inquiry for an application.
      description: |
        Creates a new authentication inquiry under the calling application.

        The request MUST carry a client-auth JWT in the `Authorization` header
        using the `SudomimusClientJWT` scheme. The JWT binds the request body
        bytes via a `body_sha256` claim and carries a single-use `jti` to
        prevent replay. See the `SudomimusClientJWT` security scheme below
        for the full claim contract.

        All three narrowing fields (`authenticationConstraints`,
        `realizeConstraints`, `returnMethods`) are optional. When absent the
        inquiry imposes no per-inquiry narrowing on that layer. When present
        the array MUST be non-empty — an empty array is explicitly rejected
        with HTTP 400. Authentication and realize arrays are limited to 16
        constraints each, return methods to 3 entries, nested allowlists to
        128 entries, and the combined stored Inquiry configuration to 65,536
        serialized UTF-8 bytes. Individual configuration strings are limited
        to 2,048 UTF-8 bytes.
      security:
        - SudomimusClientJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstablishRequest"
      responses:
        "200":
          description: Inquiry established.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstablishResponse"
        "401":
          description: Client-auth JWT missing, malformed, expired, or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |
            Application is disabled.
            Reason `ApplicationDisabled`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /status-poll:
    post:
      operationId: statusPoll
      summary: Poll the realization status of an authentication inquiry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StatusPollRequest"
      responses:
        "200":
          description: Current status of the inquiry.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusPollResponse"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /redeem:
    post:
      operationId: redeem
      summary: Redeem a realized inquiry for an application token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemRequest"
      responses:
        "200":
          description: Tokens issued.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CredentialCacheControl"
            Pragma:
              $ref: "#/components/headers/CredentialPragma"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemResponse"
        "400":
          description: |
            The inquiry could not be redeemed. The `reason` distinguishes:

            - `InquiryNotFound` — the `(exposureKey, hiddenKey,
              confirmationKey)` triple does not resolve to a realized
              inquiry.
            - `InquiryExpired` — the inquiry resolved but its lifetime has
              elapsed (expired by TTL or out of polling attempts).
            - `InquiryNotRealized` — the inquiry exists but has not been
              realized yet.
            - `InquiryAlreadyRedeemed` — the inquiry has already been
              consumed (single-use guard via conditional write; also
              fires after a REVEAL realize that surfaces the tokens
              in-line and immediately marks the inquiry redeemed).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |
            The attempt was refused. The `reason` distinguishes:

            - `ApplicationDisabled` — the application is disabled.
            - `AccountDisabled` — the realizing account is disabled.
            - `AccountDeleted` — the realizing account has been erased.
            - `ClaimConsentRequired` — the application requires a claim
              (email / first name / last name / static avatar / animated avatar) the user has not granted;
              the standing grant must be (re)established through an
              interactive browser login before tokens can be issued.
            - `EmailDomainBlocked` — one of the account's verified email
              domains is governed by a `BLOCK_ALL` login policy.
            - `EmailDomainRequiresSso` — one of the account's verified email
              domains requires SSO and the inquiry was not realized through
              the currently required connector.
            - `SsoAuthorityConflict` — verified email domains on the account
              require distinct SSO connectors. No one connector can satisfy
              every domain authority, so issuance remains blocked until the
              domain policies or account email ownership are repaired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            The realized authorization is stale.

            - `AuthorizationArtifactStale` — the exact sector binding stopped
              being authoritative after Layer 2 authorized the Inquiry because
              the assignment changed or the subject rotated. Start a new
              Inquiry so the current identity is evaluated before issuance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /info:
    post:
      operationId: info
      summary: Fetch localized public metadata about an application.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InfoRequest"
      responses:
        "200":
          description: Application metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InfoResponse"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  headers:
    CredentialCacheControl:
      description: Prevent storage of the credential-bearing response.
      schema:
        type: string
        enum: [no-store]
    CredentialPragma:
      description: Legacy cache instruction retained for credential responses.
      schema:
        type: string
        enum: [no-cache]
  securitySchemes:
    SudomimusClientJWT:
      type: http
      scheme: SudomimusClientJWT
      description: |
        Client-auth JWT carried via `Authorization: SudomimusClientJWT <jwt>`.

        The JWT MUST be signed (RS256) with the application's client-auth
        private key (paired public key registered server-side at application
        creation). Required body claims:

        - `iss`: the application anchor (must match `applicationAnchor` in
          the request body).
        - `aud`: literal string `"sudomimus-connect"`.
        - `iat`: UNIX seconds. Future-dated claims are tolerated up to a
          30-second clock skew.
        - `exp`: UNIX seconds. Lifetime (`exp - iat`) MUST be at most 60.
        - `jti`: per-request unique identifier (UUID v4 recommended). Replay
          is detected atomically server-side; the same `jti` is honored
          exactly once.
        - `body_sha256`: standard base64 of `SHA-256(rawHttpBody)` where the
          input is the UTF-8 bytes of the exact JSON body sent on the wire.
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          enum: [ok]
          description: The API invocation path completed successfully.
        service:
          type: string
          description: Stable runtime service identity.
        version:
          type: string
          description: Version from the deployed service's version manifest.
    EstablishRequest:
      type: object
      required:
        - applicationAnchor
      properties:
        applicationAnchor:
          type: string
          description: Public anchor identifying the integrating application.
        authenticationConstraints:
          type: array
          minItems: 1
          maxItems: 16
          description: |
            Optional per-inquiry narrowing of the application's
            authentication-rule layer. Absent means no narrowing. If present,
            the array MUST be non-empty; empty arrays are rejected with 400.
          items:
            $ref: "#/components/schemas/AuthenticationRuleConstraint"
        realizeConstraints:
          type: array
          minItems: 1
          maxItems: 16
          description: |
            Optional per-inquiry narrowing of the application's realize-rule
            layer. Absent means no narrowing. If present, the array MUST be
            non-empty; empty arrays are rejected with 400.
          items:
            $ref: "#/components/schemas/RealizeRuleConstraint"
        returnMethods:
          type: array
          minItems: 1
          maxItems: 3
          description: |
            Optional per-inquiry return-method declaration. Connect accepts
            CALLBACK, STATUS_POLL, and REVEAL here; DIRECT_ISSUE, OIDC, and
            DEVICE_CODE are opened by their dedicated APIs after application-
            level ReturnRules are configured. CALLBACK doubles as the concrete
            delivery info (carries the callback URL). Absent means no per-
            inquiry narrowing (CALLBACK is unreachable for this inquiry
            because no URL is anchored). If present, the array MUST be non-
            empty; empty arrays are rejected with 400.
          items:
            $ref: "#/components/schemas/ReturnMethodDeclaration"
    EstablishResponse:
      type: object
      required:
        - applicationAnchor
        - exposureKey
        - hiddenKey
      properties:
        applicationAnchor:
          type: string
        exposureKey:
          type: string
          description: Public half of the inquiry key pair; safe to share with the user agent.
        hiddenKey:
          type: string
          description: Private half of the inquiry key pair; must stay on the originating client.
    StatusPollRequest:
      type: object
      required:
        - exposureKey
        - hiddenKey
      properties:
        exposureKey:
          type: string
        hiddenKey:
          type: string
    StatusPollResponse:
      oneOf:
        - $ref: "#/components/schemas/StatusPollPendingResponse"
        - $ref: "#/components/schemas/StatusPollRealizedResponse"
      discriminator:
        propertyName: status
        mapping:
          PENDING: "#/components/schemas/StatusPollPendingResponse"
          REALIZED: "#/components/schemas/StatusPollRealizedResponse"
    StatusPollPendingResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - PENDING
    StatusPollRealizedResponse:
      type: object
      required:
        - status
        - confirmationKey
      properties:
        status:
          type: string
          enum:
            - REALIZED
        confirmationKey:
          type: string
          description: One-time key proving the inquiry has been realized; pass to /redeem.
    RedeemRequest:
      type: object
      required:
        - exposureKey
        - hiddenKey
        - confirmationKey
      properties:
        exposureKey:
          type: string
        hiddenKey:
          type: string
        confirmationKey:
          type: string
    ClaimRequirementStateView:
      type: object
      description: |
        One shareable claim: what the application requests (`requirement`)
        joined with the user's standing decision (`state`). `UNKNOWN` means
        the user was never asked; `DENIED` means the user explicitly
        declined.
      required:
        - requirement
        - state
      properties:
        requirement:
          type: string
          description: |
            The developer's policy for the claim. `SYNTHETIC_ONLY` always
            emits the generated placeholder and never asks for real data.
            `SYNTHETIC_FALLBACK` guarantees the claim is present but uses a
            generated placeholder (a stand-in name, a proxy email, or a
            generated avatar) when the user has not shared real data. Unlike `REQUIRED`, neither
            synthetic mode blocks issuance or raises an errand.
          enum: [SYNTHETIC_ONLY, OFF, OPTIONAL, REQUIRED, SYNTHETIC_FALLBACK]
        state:
          type: string
          enum: [UNKNOWN, GRANTED, DENIED]
    ClaimsStateView:
      type: object
      description: |
        Per-claim view across the five shareable claims — why a claim is
        or is not present in the minted token (policy OFF, never asked,
        declined, or granted).
      required:
        - email
        - firstName
        - lastName
        - staticAvatar
        - animatedAvatar
      properties:
        email:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        firstName:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        lastName:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        staticAvatar:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        animatedAvatar:
          $ref: "#/components/schemas/ClaimRequirementStateView"
    RedeemResponse:
      type: object
      required:
        - applicationAnchor
        - refreshToken
        - accessToken
        - claims
      properties:
        claims:
          $ref: "#/components/schemas/ClaimsStateView"
        applicationAnchor:
          type: string
        refreshToken:
          type: string
          description: |
            Long-lived refresh token (JWT). Decode its body to
            `RefreshTokenBody` (see schema). The refresh token leaves the
            system, so its body carries the sector `subject`, never the
            underlying account identifier.
        accessToken:
          type: string
          description: |
            Short-lived access token (JWT). Decode its body to
            `AccessTokenBody` (see schema) — the application-visible user
            key is the `subject` (sector subject) claim.
    AccessTokenBody:
      type: object
      description: |
        Decoded body (payload) of a Sudomimus access token. The standard
        JWT envelope claims (`iss`, `aud`, `iat`, `exp`, `jti`, `kty`,
        `sub`) live in the JWT *header*; this object is the body. The
        application keys its users on `subject`. The `firstName`,
        `lastName`, `emailAddress`, `staticAvatarUrl`, and `animatedAvatarUrl` claims are consent-gated (claim
        sharing): each is minted only when the application's claim policy
        permits it AND the user has granted that claim, so any of them may
        be absent. Synthetic modes are the exception: `SYNTHETIC_ONLY` always
        emits a generated placeholder, and `SYNTHETIC_FALLBACK` emits real
        data when granted or the placeholder otherwise.
      required:
        - subject
      properties:
        subject:
          type: string
          description: |
            The application-visible user identifier — the per-(account,
            sector) **sector subject**, also the OIDC `sub`. This is the
            value an application keys its users on; the underlying account
            identifier never appears in a token. User-rotatable.
            Opaque: never parse or format-validate it.
        firstName:
          type: string
          description: |
            Given name. Minted only when the application's claim policy
            permits it AND the user has granted the claim; may be absent
            even when the account has a value stored. Under a synthetic policy
            it is always present, possibly a placeholder name.
        lastName:
          type: string
          description: |
            Family name. Same consent gating as `firstName`.
        emailAddress:
          type: string
          description: |
            Email associated with this login. Consent-gated like
            `firstName` / `lastName` / avatar URLs (minted only when policy permits AND
            the user granted the EMAIL claim). When a real value is included:
            the exact email typed for email-OTP logins, otherwise the
            account's primary email; omitted for accounts with no verified
            email (e.g. Steam-only or AccessKey-only). Synthetic email policies
            are the exception: the field is then always present — a real
            verified email only under `SYNTHETIC_FALLBACK` when shared,
            otherwise a `…@proxy.sudomimus.email` proxy address (best-effort
            forwarding, not guaranteed; not a verified mailbox).
        staticAvatarUrl:
          type: string
          format: uri
          description: |
            Sector-scoped static public avatar URL. Consent-gated like the other
            shareable claims and minted as `STATIC_AVATAR` when policy and grant
            allow it. The URL is pairwise to this account / sector delivery
            handle, even when it resolves to the user's global avatar image.
            Synthetic avatar policies return a generated sector placeholder image.
        animatedAvatarUrl:
          type: string
          format: uri
          description: |
            Sector-scoped animated public avatar URL. Consent-gated separately
            from `staticAvatarUrl` and minted as `ANIMATED_AVATAR` when policy
            and grant allow it. If the selected avatar has no animation, this
            field is the same URL as `staticAvatarUrl`.
    RefreshTokenBody:
      type: object
      description: |
        Decoded body (payload) of a Sudomimus refresh token. Carries the
        sector `subject` (the same pairwise identifier as the access-token
        body) because the refresh token leaves the system and must never
        expose the underlying account identifier. Informational only —
        `/refresh` resolves the token by its `jti`, not by reading the body.
      required:
        - subject
      properties:
        subject:
          type: string
          description: |
            The application-visible **sector subject**. Opaque: never
            parse or format-validate it.
    InfoRequest:
      type: object
      required:
        - applicationAnchor
        - locale
      properties:
        applicationAnchor:
          type: string
        locale:
          type: string
          description: IETF BCP 47 locale tag (e.g. "en-US"). Falls back to the application's default locale if not available.
    InfoResponse:
      type: object
      required:
        - applicationAnchor
        - applicationName
        - applicationPublicKey
      properties:
        applicationAnchor:
          type: string
        applicationName:
          type: string
          description: Localized application display name.
        applicationPublicKey:
          type: string
          description: PEM-encoded application public key used to verify issued JWTs.
    AuthenticationRuleConstraint:
      type: object
      required:
        - method
        - payload
      properties:
        method:
          type: string
          description: Which authentication method this constraint narrows to.
          enum:
            - PASSKEY_USERNAMELESS
            - PASSKEY_REASONED
            - EMAIL_VERIFICATION
            - STEAM_TICKET
            - STEAM_OPENID
            - ACCESS_KEY_DIRECT
            - GOOGLE_OAUTH
            - GITHUB_OAUTH
            - DISCORD_OAUTH
            - BATTLENET_OAUTH
            - X_OAUTH
        payload:
          oneOf:
            - $ref: "#/components/schemas/AuthenticationRulePasskeyUsernamelessPayload"
            - $ref: "#/components/schemas/AuthenticationRulePasskeyReasonedPayload"
            - $ref: "#/components/schemas/AuthenticationRuleEmailVerificationPayload"
            - $ref: "#/components/schemas/AuthenticationRuleSteamTicketPayload"
            - $ref: "#/components/schemas/AuthenticationRuleSteamOpenIdPayload"
            - $ref: "#/components/schemas/AuthenticationRuleAccessKeyDirectPayload"
            - $ref: "#/components/schemas/AuthenticationRuleGoogleOAuthPayload"
            - $ref: "#/components/schemas/AuthenticationRuleGitHubOAuthPayload"
            - $ref: "#/components/schemas/AuthenticationRuleDiscordOAuthPayload"
            - $ref: "#/components/schemas/AuthenticationRuleBattleNetOAuthPayload"
            - $ref: "#/components/schemas/AuthenticationRuleXOAuthPayload"
        accessTokenTtlSeconds:
          type: integer
          description: Per-constraint override for access token lifetime. Resolved at realize time.
        refreshTokenTtlSeconds:
          type: integer
          description: Per-constraint override for refresh token lifetime. Resolved at realize time.
    AuthenticationRulePasskeyUsernamelessPayload:
      type: object
      description: |
        Empty payload — narrows to usernameless (discoverable-credential)
        passkey login, the "Sign in with a passkey" entry shown before any
        email is entered. Realize authorization is still decided by Layer 2.
      additionalProperties: false
    AuthenticationRulePasskeyReasonedPayload:
      type: object
      description: |
        Empty payload — narrows to email-first ("reasoned") passkey login,
        the passkey option offered after the user enters their email.
        Realize authorization is still decided by Layer 2.
      additionalProperties: false
    AuthenticationRuleEmailVerificationPayload:
      type: object
      description: Empty payload — email-verification constraints carry no further parameters.
      additionalProperties: false
    AuthenticationRuleSteamTicketPayload:
      type: object
      description: |
        Steam-native-ticket payload. Gates native-api's
        `/direct-issue/steam-ticket` flow. `allowedSteamAppIds` is the
        non-empty list of Steam App IDs whose tickets are accepted.
      required:
        - allowedSteamAppIds
      additionalProperties: false
      properties:
        allowedSteamAppIds:
          type: array
          minItems: 1
          maxItems: 128
          uniqueItems: true
          items:
            type: integer
            format: int64
            minimum: 1
    AuthenticationRuleSteamOpenIdPayload:
      type: object
      description: |
        Steam OpenID 2.0 carries no app-id concept (that is
        native-ticket-specific). Any Steam account is accepted as long
        as the application's rule set allows STEAM_OPENID at all.
      additionalProperties: false
    AuthenticationRuleAccessKeyDirectPayload:
      type: object
      description: |
        Gates native-api's `/direct-issue/access-key` flow. Credentials
        live in the dedicated `AccessKeyCredential` table; no row of
        this method ever appears in the `Authentication` table.
      additionalProperties: false
    AuthenticationRuleGoogleOAuthPayload:
      type: object
      description: |
        Empty `allowedHostedDomains` means no hosted-domain gating. A
        non-empty list requires an exact, case-insensitive match against the
        Google Workspace `hd` claim. The server lowercases and deduplicates
        entries before persistence.
      additionalProperties: false
      properties:
        allowedHostedDomains:
          type: array
          maxItems: 128
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 2048
    AuthenticationRuleGitHubOAuthPayload:
      type: object
      description: |
        Empty `allowedGitHubOrgs` array means no org gating — any
        GitHub account is accepted. Non-empty means the user must be a
        member of at least one listed organization (case-insensitive
        match on the org `login`). The `read:org` OAuth scope is only
        requested when at least one matching rule carries a non-empty
        allowlist; applications without org gating keep the minimal
        `read:user user:email` consent screen.
      required:
        - allowedGitHubOrgs
      additionalProperties: false
      properties:
        allowedGitHubOrgs:
          type: array
          maxItems: 128
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 2048
    AuthenticationRuleDiscordOAuthPayload:
      type: object
      description: |
        Empty `allowedDiscordGuilds` means no guild gating. A non-empty list
        requires membership in at least one listed Discord guild and causes
        the authentication flow to request the `guilds` scope. Entries are
        trimmed and deduplicated before persistence.
      additionalProperties: false
      properties:
        allowedDiscordGuilds:
          type: array
          maxItems: 128
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 2048
    AuthenticationRuleBattleNetOAuthPayload:
      type: object
      description: |
        Battle.net (Blizzard) has no per-application gating concept, so any
        Battle.net account is accepted as long as the application's rule set
        allows BATTLENET_OAUTH at all. Empty payload. Battle.net is an
        email-less provider, so Layer-2 EMAIL rules fail closed against a
        Battle.net-only account.
      additionalProperties: false
    AuthenticationRuleXOAuthPayload:
      type: object
      description: |
        X (formerly Twitter) has no per-application gating concept, so any
        X account is accepted as long as the application's rule set allows
        X_OAUTH at all. Empty payload. X is an email-less provider, so
        Layer-2 EMAIL rules fail closed against an X-only account.
      additionalProperties: false
    RealizeRuleConstraint:
      type: object
      required:
        - constraintType
        - payload
      properties:
        constraintType:
          type: string
          description: Which realize-rule kind this constraint narrows to.
          enum:
            - EMAIL
            - STEAM_ID
            - ACCOUNT_ALIAS
            - SECTOR_SUBJECT
        payload:
          oneOf:
            - $ref: "#/components/schemas/RealizeRuleEmailPayload"
            - $ref: "#/components/schemas/RealizeRuleSteamIdPayload"
            - $ref: "#/components/schemas/RealizeRuleAccountAliasPayload"
            - $ref: "#/components/schemas/RealizeRuleSectorSubjectPayload"
        accessTokenTtlSeconds:
          type: integer
          description: Per-constraint override for access token lifetime. Resolved at realize time.
        refreshTokenTtlSeconds:
          type: integer
          description: Per-constraint override for refresh token lifetime. Resolved at realize time.
    RealizeRuleEmailPayload:
      type: object
      required:
        - allowedEmails
      properties:
        allowedEmails:
          type: array
          minItems: 1
          maxItems: 128
          uniqueItems: true
          description: |
            List of email addresses or glob patterns the realized identity
            must match. Glob patterns are bounded by server-side limits to
            prevent regex backtracking attacks.
          items:
            type: string
            maxLength: 254
    RealizeRuleSteamIdPayload:
      type: object
      description: |
        Per-realize-time check against the realized account's SteamID64.
        Each entry is either the literal `"*"` (wildcard, allow any
        Steam identity) or a decimal SteamID64 string.
      required:
        - allowedSteamIds
      properties:
        allowedSteamIds:
          type: array
          minItems: 1
          maxItems: 128
          uniqueItems: true
          items:
            type: string
            pattern: "^(\\*|[0-9]{1,20})$"
    RealizeRuleAccountAliasPayload:
      type: object
      description: |
        Exact match on the realizing account's **account alias** — the
        user-visible, application-invisible, rotatable handle the user
        reads in the With portal and shares out-of-band with whoever
        configures the rule. No wildcard — because the account does not
        yet exist during fresh registration, this constraint matches
        nothing for new sign-ups. The alias is opaque: it is compared by
        exact-string equality and never parsed or format-validated.
      required:
        - allowedAccountAliases
      properties:
        allowedAccountAliases:
          type: array
          minItems: 1
          maxItems: 128
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 128
    RealizeRuleSectorSubjectPayload:
      type: object
      description: |
        Exact match on the realizing account's **sector subject** for the
        realizing application's sector — the application-visible token
        `sub` the owner already sees in their own logs. No wildcard.
        Rotating the subject locks the user out (it becomes a brand-new,
        not-yet-allow-listed identity) rather than letting them bypass the
        rule. The subject is opaque: compared by exact-string equality and
        never parsed or format-validated.
      required:
        - allowedSectorSubjects
      properties:
        allowedSectorSubjects:
          type: array
          minItems: 1
          maxItems: 128
          uniqueItems: true
          items:
            type: string
            minLength: 1
            maxLength: 128
    ReturnMethodDeclaration:
      oneOf:
        - $ref: "#/components/schemas/ReturnMethodCallback"
        - $ref: "#/components/schemas/ReturnMethodStatusPoll"
        - $ref: "#/components/schemas/ReturnMethodReveal"
      discriminator:
        propertyName: type
        mapping:
          CALLBACK: "#/components/schemas/ReturnMethodCallback"
          STATUS_POLL: "#/components/schemas/ReturnMethodStatusPoll"
          REVEAL: "#/components/schemas/ReturnMethodReveal"
    ReturnMethodCallback:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          enum:
            - CALLBACK
        payload:
          type: object
          required:
            - callbackUrl
          properties:
            callbackUrl:
              type: string
              maxLength: 2048
              description: |
                Concrete callback URL for this inquiry. The host MUST match
                one of the application's allowed callback domains. The scheme
                MUST be HTTPS except loopback HTTP for local development
                (`localhost`, `127.0.0.1`, `[::1]`). The server enforces the
                length limit in UTF-8 bytes.
    ReturnMethodStatusPoll:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          enum:
            - STATUS_POLL
        payload:
          type: object
          description: Empty payload — STATUS_POLL carries no per-inquiry parameters.
          additionalProperties: false
    ReturnMethodReveal:
      type: object
      required:
        - type
        - payload
      properties:
        type:
          type: string
          enum:
            - REVEAL
        payload:
          type: object
          description: |
            Empty payload. Tokens are surfaced directly in the UI at
            realize time and the inquiry is marked redeemed immediately;
            any subsequent `/redeem` for the same inquiry fails with
            `InquiryAlreadyRedeemed`.
          additionalProperties: false
    Error:
      type: object
      description: |
        Error response body. The Connect service emits `{ "reason": "<SymbolDescription>" }`
        for known failure modes. When the reason symbol's description begins with
        `PRIVATE`, the body is empty (zero bytes) and only the HTTP status carries
        signal — both `reason` and the body itself are absent in that case.
      properties:
        reason:
          type: string
          description: Stable machine-readable reason code.

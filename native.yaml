openapi: 3.1.0
info:
  title: Sudomimus Native
  version: 2.4.1
  summary: Native client entry point for the Sudomimus authentication platform.
  description: |
    The Native API is the public gateway used by native clients
    (desktop applications, games, headless processes) that authenticate
    users directly through a platform identity provider — currently Steam
    via the Steamworks SDK, or a long-lived access-key credential bound
    to an application and account.

    The native flow is "direct-issue": the client passes a platform-issued
    proof (Steam ticket) or a stored credential (access key) to the Native
    API, which verifies it and issues application access and refresh
    tokens in a single round trip. No browser handoff, no inquiry
    establishment, no polling.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://native-api.sudomimus.com
    description: Production
# No HTTP-level auth: the direct-issue endpoints authenticate via credentials
# (Steam ticket / access-key) carried in the request body.
security: []
paths:
  /health:
    get:
      operationId: health
      summary: Report Native invocation health and deployment identity.
      responses:
        "200":
          description: |
            The API invocation path is operational and reports the deployed
            service identity. This response does not assert dependency,
            configuration, or business-capability readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /direct-issue/access-key:
    post:
      operationId: directIssueAccessKey
      summary: Exchange an access-key credential for application tokens.
      description: |
        Trade a long-lived access-key credential (identifier + secret) for
        application access and refresh tokens. Access keys are
        application-scoped credentials bound to a specific account; the
        credential carries optional TTL bounds and an opt-in expiry
        timestamp.

        The server:

          1. Applies global and per-application semantic admission budgets.
          2. Validates the application's authentication-rule layer admits
             `ACCESS_KEY_DIRECT`.
          3. Looks up the credential by `accessKeyIdentifier`.
          4. Cross-checks that the credential belongs to the application
             named in `applicationAnchor`, is not revoked, and has not
             expired.
          5. Timing-safe-verifies `accessKeySecret`.
          6. Validates the realize-rule layer (`EMAIL` / `STEAM_ID` /
             `ACCOUNT_ALIAS` / `SECTOR_SUBJECT`) and ensures a
             `DIRECT_ISSUE` return rule exists.
          7. Issues access + refresh JWTs and best-effort touches the
             credential's `lastUsedAt` timestamp.

        All credential-level failures (unknown identifier, app mismatch,
        revoked, expired, wrong secret) collapse into a single opaque
        `AccessKeyDirectDenied` 401 reason to avoid leaking identifier
        existence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectIssueAccessKeyRequest"
      responses:
        "200":
          description: Tokens issued.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CredentialCacheControl"
            Pragma:
              $ref: "#/components/headers/CredentialPragma"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectIssueAccessKeyResponse"
        "400":
          description: |
            Malformed request body. The `reason` distinguishes
            `InvalidAccessKeyIdentifier` (must use the canonical
            `acs_k_<UUID v4>` form) and `InvalidAccessKeySecret` (must use
            the canonical `acs_t_<64 lowercase hex chars>` form).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: |
            The access-key credential was rejected. The `reason` is
            uniformly `AccessKeyDirectDenied` regardless of root cause
            (not found, app mismatch, revoked, expired, wrong secret).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |
            The attempt was refused. The response `reason` distinguishes:

            - `Layer1Denied`, `Layer2Denied`, `Layer3Denied` — the
              application's three-layer rules rejected this attempt
              (which layer is indicated by the reason code).
            - `ApplicationDisabled` — the application is disabled.
            - `AccountDisabled` — the resolved account is disabled.
            - `AccountDeleted` — the resolved account has been erased.
            - `EmailDomainBlocked` — a verified adopted domain blocks the
              account platform-wide.
            - `EmailDomainRequiresSso` — a verified adopted domain requires a
              different SSO connector than this non-interactive proof used.
            - `SsoAuthorityConflict` — verified adopted domains require
              distinct SSO connectors. Direct issue remains blocked until the
              domain policies or account email ownership are repaired.
            - `ClaimConsentRequired` — the application requires a claim the
              user has not yet granted; direct-issue cannot prompt.
            - `RequiredClaimDataMissing` — every required claim is granted,
              but the account lacks the underlying data (e.g. no email on a
              Steam-created account).

            For the two claim-gate reasons the body additionally carries a
            per-claim `claims` view (UNKNOWN distinguishes "never asked"
            from DENIED "declined") and an `errand` handoff — a short-lived
            browser URL where the user can authenticate, complete the
            missing data, and grant consent. Open `errand.url` in the
            system browser, poll `GET /errand/{errandKey}/status` (or wait
            for the user), then retry this request once.

            Repeated blocked calls reuse the live ticket: while it has at
            least 15 minutes left and the owed task scope is unchanged, the
            same `errandKey` (with its original `expiresAt`) is returned
            again, so retries cannot split the handoff state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectIssueDeniedError"
        "404":
          description: Application anchor not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            `AuthorizationArtifactStale` — the exact sector binding changed
            after Layer 2 evaluated the direct-issue attempt. Retry the entire
            request so the current identity is evaluated before issuance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: |
            The AccessKey route's per-application/global attempt budget or
            credential-failure circuit is exhausted. The response
            intentionally has no stable reason body. No rule, credential, or
            per-attempt audit work is performed for this rejection.
        "500":
          description: |
            Internal consistency failure while resolving the credential's
            account. The response is status-only with an empty body; the
            server-only classification is not part of the public contract.
        "503":
          description: |
            The semantic admission or credential-failure counter is
            unavailable. The request fails closed and intentionally has no
            stable reason body.
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /direct-issue/steam-ticket:
    post:
      operationId: directIssueSteamTicket
      summary: Exchange a Steam Web API auth ticket for application tokens.
      description: |
        The client SDK calls `ISteamUser::GetAuthTicketForWebApi("sudomimus")`
        (the identity string MUST be exactly `"sudomimus"`), waits for the
        `GetTicketForWebApiResponse_t` callback, hex-encodes the ticket
        bytes, and POSTs them here together with the application anchor and
        the Steam App ID. The server:

          1. Validates the application's authentication-rule layer admits
             `STEAM_TICKET` for this `steamAppId`.
          2. Applies fixed-window semantic budgets after local validation:
             150 eligible attempts per application and 200 globally per 10
             seconds. It also opens a 60-second failure circuit at 20
             Steam/upstream failures per application or 60 globally. A
             blocked request returns `429` before replay storage, per-request
             auditing, or Steam verification. Per-IP limiting remains an
             independent edge responsibility.
          3. Atomically creates a 60-second processing reservation for
             `sha256(steamTicketHex.toLowerCase())`; a concurrent duplicate
             is rejected with `409`.
          4. Verifies the ticket with Steam's
             `ISteamUserAuth/AuthenticateUserTicket` endpoint, identity
             `"sudomimus"`, then promotes that exact live reservation to a
             24-hour replay window. Invalid and upstream-failed attempts keep
             only the short reservation.
          5. Validates the application's realize-rule layer (`EMAIL` /
             `STEAM_ID` / `ACCOUNT_ALIAS` / `SECTOR_SUBJECT`) and ensures a
             `DIRECT_ISSUE` return rule exists.
          6. Issues access + refresh JWTs signed with the application's
             private key.

        Tokens follow the same shape as those issued through other ordinary
        application-token issuance paths. Verification is the responsibility
        of the relying party (see the `Sudomimus.Token` SDK).

        The Layer-1 method name on the wire is `STEAM_TICKET`, but the
        resolved identity is stored as a `STEAM_ID64` Authentication row
        — `STEAM_TICKET` and `STEAM_OPENID` share a single identity row
        per SteamID64, differing only in how the SteamID64 was proven.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DirectIssueSteamTicketRequest"
      responses:
        "200":
          description: Tokens issued.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CredentialCacheControl"
            Pragma:
              $ref: "#/components/headers/CredentialPragma"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectIssueSteamTicketResponse"
        "400":
          description: Malformed request (e.g. invalid `steamAppId`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Steam rejected the ticket with provider error code 101.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |
            The attempt was refused. The response `reason` distinguishes:

            - `Layer1Denied`, `Layer2Denied`, `Layer3Denied` — the
              application's three-layer rules rejected this attempt
              (which layer is indicated by the reason code).
            - `ApplicationDisabled` — the application is disabled.
            - `AccountDisabled` — the resolved account is disabled.
            - `AccountDeleted` — the resolved account has been erased.
            - `EmailDomainBlocked` — a verified adopted domain blocks the
              account platform-wide.
            - `EmailDomainRequiresSso` — a verified adopted domain requires a
              different SSO connector than this non-interactive proof used.
            - `SsoAuthorityConflict` — verified adopted domains require
              distinct SSO connectors. Direct issue remains blocked until the
              domain policies or account email ownership are repaired.
            - `ClaimConsentRequired` — the application requires a claim the
              user has not yet granted; direct-issue cannot prompt.
            - `RequiredClaimDataMissing` — every required claim is granted,
              but the account lacks the underlying data (e.g. no email on a
              Steam-created account).

            For the two claim-gate reasons the body additionally carries a
            per-claim `claims` view (UNKNOWN distinguishes "never asked"
            from DENIED "declined") and an `errand` handoff — a short-lived
            browser URL where the user can authenticate, complete the
            missing data, and grant consent. Open `errand.url` in the
            system browser, poll `GET /errand/{errandKey}/status` (or wait
            for the user), then retry this request once.

            Repeated blocked calls reuse the live ticket: while it has at
            least 15 minutes left and the owed task scope is unchanged, the
            same `errandKey` (with its original `expiresAt`) is returned
            again, so retries cannot split the handoff state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DirectIssueDeniedError"
        "404":
          description: Application anchor not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            Conflict. The response `reason` distinguishes:

            - `ReplayProtectionAlreadySeen` — this Steam ticket is currently
              being verified, was already Steam-verified within the 24-hour
              replay window, or its processing reservation could not be
              promoted safely. Acquire a fresh ticket via
              `GetAuthTicketForWebApi` and retry.
            - `AuthorizationArtifactStale` — the exact sector binding changed
              after Layer 2 evaluated the direct-issue attempt. Acquire a fresh
              ticket and retry the entire request so the current identity is
              evaluated before issuance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: |
            The Steam route's per-application/global attempt budget or failure
            circuit is exhausted. The response intentionally has no stable
            reason body; back off before acquiring and submitting another
            Steam ticket. No replay/audit row or Steam Partner API request is
            made for this rejection.
        "502":
          description: Steam's verification endpoint was unreachable, returned a non-101 provider error, or returned an unparseable, malformed, or ambiguous response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /errand:
    post:
      operationId: createErrand
      summary: Proactively mint an errand for a user you already authenticated.
      description: |
        Ask, on the application's own behalf, for an errand side-trip so the
        user can manage what they share — the on-demand counterpart to the
        claim-gate 403. Use it when direct-issue would succeed but you want to
        invite the user to grant OPTIONAL claims that native issuance can never
        prompt for, or to let a Steam-only user add an email they choose to
        share.

        Authenticated by an access token you already hold for the user (from an
        earlier direct-issue or Connect redeem). It is verified and its expiry is
        enforced, then reverse-resolved to the account — so present a fresh one.
        The access token only identifies the user; it never authorizes the
        sharing. Every minted ticket therefore forces an in-browser
        re-authentication before any task runs, so a leaked token cannot alter a
        user's grants.

        When the account already satisfies the application's claim policy the
        response carries `errand: null` — nothing to do, just direct-issue.
        Otherwise open `errand.url` and poll `/errand/{errandKey}/status`
        exactly as for the 403 handoff.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateErrandRequest"
      responses:
        "200":
          description: |
            Either the errand handoff to open, or `errand: null` when nothing is
            owed. `claims` always reports the per-claim state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateErrandResponse"
        "401":
          description: The access token is missing, malformed, expired, or no longer resolves to an account.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: The application or the account is disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /errand/{errandKey}/status:
    get:
      operationId: errandStatus
      summary: Poll the status of an errand handoff.
      description: |
        Lightweight polling endpoint for the errand handoff returned by a
        claim-gate 403: bearer-by-key, no other authentication, a pure
        single-row read with no side effects — unlike retrying direct-issue,
        which is the full credential round-trip. Poll every ~2 seconds while
        the user completes the browser side-trip, or skip polling and let
        the user signal completion in your own UI.

        An accidental direct-issue retry will not split your polling state:
        while the current ticket has at least 15 minutes left and the task
        scope is unchanged, the retry returns the SAME `errandKey`; a fresh
        ticket is minted only near expiry or after a scope change.

        Unknown, malformed, and expired keys are deliberately
        indistinguishable: all report `EXPIRED`, so the endpoint cannot be
        used to probe key validity. `COMPLETED` means every task finished —
        retry the direct-issue request once to obtain tokens.
      parameters:
        - name: errandKey
          in: path
          required: true
          schema:
            type: string
          description: The `errand.errandKey` value from the 403 body.
      responses:
        "200":
          description: Current errand status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrandStatusResponse"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  headers:
    CredentialCacheControl:
      description: Prevent storage of the credential-bearing response.
      schema:
        type: string
        enum: [no-store]
    CredentialPragma:
      description: Legacy cache instruction retained for credential responses.
      schema:
        type: string
        enum: [no-cache]
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required:
        - status
        - service
        - version
      properties:
        status:
          type: string
          enum: [ok]
          description: The API invocation path completed successfully.
        service:
          type: string
          description: Stable runtime service identity.
        version:
          type: string
          description: Version from the deployed service's version manifest.
    DirectIssueAccessKeyRequest:
      type: object
      required:
        - applicationAnchor
        - accessKeyIdentifier
        - accessKeySecret
      properties:
        applicationAnchor:
          type: string
          description: Public anchor identifying the integrating application.
        accessKeyIdentifier:
          type: string
          pattern: "^acs_k_[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-4[0-9a-fA-F]{3}-[89aAbB][0-9a-fA-F]{3}-[0-9a-fA-F]{12}$"
          description: |
            Canonical access-key identifier, including the mandatory
            `acs_k_` prefix followed by its UUID.
        accessKeySecret:
          type: string
          pattern: "^acs_t_[0-9a-f]{64}$"
          description: |
            Canonical access-key secret, including the mandatory `acs_t_`
            prefix followed by 64 lowercase hexadecimal characters (32
            random bytes). Returned exactly once when the access key was
            issued. Never logged or persisted in plaintext server-side after
            creation.
    DirectIssueAccessKeyResponse:
      type: object
      required:
        - applicationAnchor
        - accessToken
        - refreshToken
        - claims
      properties:
        claims:
          $ref: "#/components/schemas/ClaimsStateView"
        applicationAnchor:
          type: string
        accessToken:
          type: string
          description: |
            Short-lived access token (JWT). Body shape matches Connect's
            `AccessTokenBody`: the application-visible user key is the
            `subject` (sector subject) claim, not a raw account identifier.
            The `firstName` / `lastName` / `emailAddress` / `staticAvatarUrl` /
            `animatedAvatarUrl` claims are
            consent-gated and may be absent (see Connect `AccessTokenBody`).
        refreshToken:
          type: string
          description: Long-lived refresh token (JWT). Use Session API `/refresh` for renewal without re-presenting the access key.
    DirectIssueSteamTicketRequest:
      type: object
      required:
        - applicationAnchor
        - steamTicketHex
        - steamAppId
      properties:
        applicationAnchor:
          type: string
          description: Public anchor identifying the integrating application.
        steamTicketHex:
          type: string
          description: |
            Hex-encoded Steam Web API auth ticket bytes returned from
            `ISteamUser::GetAuthTicketForWebApi("sudomimus")`. Case
            insensitive — the server lowercases before hashing for replay
            protection, but forwards the original bytes to Steam.
        steamAppId:
          type: integer
          format: int64
          minimum: 1
          description: |
            Steam App ID under which the ticket was generated. Must be
            allow-listed by the application's `STEAM_TICKET` authentication
            rule. Tickets are bound to their issuing App ID server-side;
            passing a different value will fail Steam verification.
    DirectIssueSteamTicketResponse:
      type: object
      required:
        - applicationAnchor
        - accessToken
        - refreshToken
        - claims
      properties:
        claims:
          $ref: "#/components/schemas/ClaimsStateView"
        applicationAnchor:
          type: string
        accessToken:
          type: string
          description: |
            Short-lived access token (JWT). Body shape matches Connect's
            `AccessTokenBody`: the application-visible user key is the
            `subject` (sector subject) claim, not a raw account identifier.
            The `firstName` / `lastName` / `emailAddress` / `staticAvatarUrl` /
            `animatedAvatarUrl` claims are
            consent-gated and may be absent (see Connect `AccessTokenBody`).
        refreshToken:
          type: string
          description: Long-lived refresh token (JWT). Use Session API `/refresh` to obtain a new access token without re-acquiring a Steam ticket.
    ClaimRequirementStateView:
      type: object
      description: |
        One shareable claim: what the application requests (`requirement`)
        joined with the user's standing decision (`state`). `UNKNOWN` means
        the user was never asked; `DENIED` means the user explicitly
        declined.
      required:
        - requirement
        - state
      properties:
        requirement:
          type: string
          description: |
            The developer's policy for the claim. `SYNTHETIC_ONLY` always
            emits the generated placeholder and never asks for real data.
            `SYNTHETIC_FALLBACK` guarantees the claim is present but uses a
            generated placeholder (a stand-in name, a proxy email, or a
            generated avatar) when the user has not shared real data. Unlike `REQUIRED`, neither
            synthetic mode blocks issuance or raises an errand.
          enum: [SYNTHETIC_ONLY, OFF, OPTIONAL, REQUIRED, SYNTHETIC_FALLBACK]
        state:
          type: string
          enum: [UNKNOWN, GRANTED, DENIED]
    ClaimsStateView:
      type: object
      description: |
        Per-claim view across the five shareable claims, carried on both
        the 200 (why is a claim absent from the minted token) and the
        claim-gate 403 (what is still owed).
      required:
        - email
        - firstName
        - lastName
        - staticAvatar
        - animatedAvatar
      properties:
        email:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        firstName:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        lastName:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        staticAvatar:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        animatedAvatar:
          $ref: "#/components/schemas/ClaimRequirementStateView"
    ErrandHandoff:
      type: object
      description: |
        The browser side-trip that unblocks a claim-gated direct-issue:
        a short-lived (30 minutes), single-use bearer URL where the user
        authenticates (when account data is being written), completes any
        missing data, and grants consent. The stored task list is server-
        side only — open the URL and let the page drive. Repeated blocked
        calls re-hand the same live handoff (same `errandKey`, original
        `expiresAt`) while it has at least 15 minutes left and the owed
        task scope is unchanged.
      required:
        - errandKey
        - url
        - expiresAt
      properties:
        errandKey:
          type: string
          description: Bearer key (`ernd_…`); also the status-poll path key.
        url:
          type: string
          format: uri
          description: Open this in the user's system browser.
        expiresAt:
          type: string
          format: date-time
    DirectIssueDeniedError:
      type: object
      description: |
        403 body. For the claim-gate reasons (`ClaimConsentRequired`,
        `RequiredClaimDataMissing`) the `claims` view and the `errand`
        handoff are present; for every other reason only `reason` is set.
      required:
        - reason
      properties:
        reason:
          type: string
          description: Stable machine-readable reason code.
        claims:
          $ref: "#/components/schemas/ClaimsStateView"
        errand:
          $ref: "#/components/schemas/ErrandHandoff"
    CreateErrandRequest:
      type: object
      required:
        - accessToken
      properties:
        accessToken:
          type: string
          description: |
            An access token (JWT) the application already holds for the user.
            Verified server-side with its expiry enforced, then reverse-resolved
            from its `subject` (sector subject) claim to the account — so present
            a currently-valid token, not an expired one.
    CreateErrandResponse:
      type: object
      required:
        - errand
        - claims
      properties:
        errand:
          description: |
            The browser side-trip to open, or `null` when the account already
            satisfies the application's claim policy (nothing to consent to or
            complete) — in that case just direct-issue.
          oneOf:
            - $ref: "#/components/schemas/ErrandHandoff"
            - type: "null"
        claims:
          $ref: "#/components/schemas/ClaimsStateView"
    ErrandStatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum: [PENDING, COMPLETED, EXPIRED]
    Error:
      type: object
      description: |
        Error response body. The Native service emits `{ "reason": "<SymbolDescription>" }`
        for known failure modes. When the reason symbol's description begins with
        `PRIVATE`, the body is empty (zero bytes) and only the HTTP status carries
        signal — both `reason` and the body itself are absent in that case. A
        missing, malformed, or structurally invalid JSON request body returns
        `InvalidBody` without parser or validation-library detail.
      properties:
        reason:
          type: string
          description: Stable machine-readable reason code.

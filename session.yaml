openapi: 3.1.0
info:
  title: Sudomimus Session
  version: 1.2.0
  summary: Application refresh-token session lifecycle API.
  description: |
    The Session API owns the ordinary Sudomimus application refresh-token
    lifecycle after an initial flow has issued an access/refresh token pair.
    Connect, device-api, and native-api can all create ordinary refresh-token
    rows; callers use this API to rotate, introspect, logout, or revoke those
    sessions.
  license:
    name: MIT
    identifier: MIT
servers:
  - url: https://session-api.sudomimus.com
    description: Production
security: []
paths:
  /health:
    get:
      operationId: health
      summary: Report Session invocation health and deployment identity.
      responses:
        "200":
          description: |
            The API invocation path is operational and reports the deployed
            service identity. This response does not assert dependency,
            configuration, or business-capability readiness.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /refresh:
    post:
      operationId: refresh
      summary: Rotate a refresh token and issue a new access token.
      description: |
        Issues a new access token AND a new refresh token, atomically
        invalidating the presented refresh token. The Session API implements
        OAuth 2.1 BCP §4.14.2 strict refresh-token rotation: every successful
        `/refresh` rotates the refresh token, and a later presentation of the
        parent token is treated as evidence of compromise unless it is a
        near-simultaneous retry inside the rotation grace window.

        Inside that short grace window, if the parent was already rotated and
        the winning child is still active, the retry adopts the same child and
        receives HTTP 200 instead of revoking the family. Outside the grace
        window, or when adoption cannot cleanly rebuild the child session, the
        entire refresh-token family is revoked and the caller must restart with
        its initial login flow: Connect inquiry, device authorization, native
        direct-issue, or another ordinary application-token issuance path.

        This endpoint accepts only refresh-token families whose required
        issuance protocol is `APPLICATION`. OIDC refresh-token families are
        rejected before account, authority, grace-adoption, or rotation work
        and must use the OIDC `/token` endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
      responses:
        "200":
          description: |
            New access token and rotated refresh token issued. A benign
            concurrent retry may also receive 200 by adopting the live child
            created by the winning refresh inside the rotation grace window.
          headers:
            Cache-Control:
              $ref: "#/components/headers/CredentialCacheControl"
            Pragma:
              $ref: "#/components/headers/CredentialPragma"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RefreshResponse"
        "400":
          description: Reason `AccountNotFound` — the account behind the refresh token could not be resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: |
            Refresh token rejected. The `reason` distinguishes:

            - `RefreshTokenInvalid` — the JWT is malformed, has an unsupported
              algorithm or issuer, lacks required claims, names an unknown
              application, or no longer resolves to a stored token row.
            - `RefreshTokenInvalidType` — the JWT is not a refresh token, or
              the stored family belongs to the OIDC issuance protocol.
            - `RefreshTokenInvalidSignature` — signature verification failed.
            - `RefreshTokenSuspended` — the refresh-token session is suspended.
            - `RefreshTokenExpired` — the token is past its `exp`.
            - `RefreshTokenRevoked` — the refresh-token row was revoked.
            - `RefreshTokenFamilyCompromised` — the presented token had already been rotated and grace-window adoption did not apply; the whole family has now been revoked.

            A concurrent rotation race that cannot adopt the winning child also
            returns HTTP 401 and revokes the family, but intentionally carries
            an empty response body rather than exposing a public reason.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: |
            The attempt was refused. The `reason` distinguishes:

            - `AccountDisabled` — the account behind the refresh token is disabled.
            - `AccountDeleted` — the account has been erased.
            - `ApplicationDisabled` — the application, parent sector, or parent organization no longer permits token issuance.
            - `ClaimConsentRequired` — a REQUIRED claim is no longer satisfied by a standing grant.
            - `EmailDomainBlocked` — a verified adopted domain now blocks this account.
            - `EmailDomainRequiresSso` — a verified adopted domain now requires SSO and this session was not realized through the required connector.
            - `SsoAuthorityConflict` — verified adopted domains require distinct SSO connectors, so no refresh session can satisfy every domain authority until the conflict is repaired.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /introspect:
    post:
      operationId: introspect
      summary: Check whether the session behind an access token is still valid.
      description: |
        Returns the revocation status of the refresh-token session that the
        supplied access token descends from. The access token is
        self-authenticating: its signature is verified against the issuing
        application's public key, so no client-auth JWT is required. The access
        token's own expiry is not enforced here; the answer describes the
        underlying session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntrospectRequest"
      responses:
        "200":
          description: Status of the session behind the access token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectResponse"
        "401":
          description: Access token missing, malformed, or with an invalid signature.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /logout:
    post:
      operationId: logout
      summary: Revoke the session behind a refresh token.
      description: |
        Revokes the single session identified by the supplied refresh token.
        Possession of a genuine refresh token authorizes the revocation, so no
        client-auth JWT is required. The operation is idempotent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
      responses:
        "200":
          description: Revocation outcome.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /revoke-all:
    post:
      operationId: revokeAll
      summary: Revoke every session of an account for the calling application.
      description: |
        Revokes all refresh tokens belonging to the given account that were
        issued for the calling application. This is an application-authority
        action, so it requires a client-auth JWT with audience
        `sudomimus-session`. Revocation is scoped to the calling application;
        sessions of the same account under other applications are unaffected.
      security:
        - SudomimusClientJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeAllRequest"
      responses:
        "200":
          description: Number of sessions revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeAllResponse"
        "401":
          description: Client-auth JWT missing, malformed, expired, or invalid.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        default:
          description: Error response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  headers:
    CredentialCacheControl:
      description: Prevent storage of the credential-bearing response.
      schema:
        type: string
        enum: [no-store]
    CredentialPragma:
      description: Legacy cache instruction retained for credential responses.
      schema:
        type: string
        enum: [no-cache]
  securitySchemes:
    SudomimusClientJWT:
      type: http
      scheme: SudomimusClientJWT
      description: |
        Client-auth JWT carried via `Authorization: SudomimusClientJWT <jwt>`.
        For Session API `/revoke-all`, the `aud` claim MUST be the literal
        string `"sudomimus-session"`. The JWT is RS256-signed with the
        application's client-auth private key and carries `iss`, `iat`, `exp`,
        `jti`, and `body_sha256` exactly like Connect `/establish`.
  schemas:
    HealthResponse:
      type: object
      additionalProperties: false
      required: [status, service, version]
      properties:
        status:
          type: string
          enum: [ok]
          description: The API invocation path completed successfully.
        service:
          type: string
          description: Stable runtime service identity.
        version:
          type: string
          description: Version from the deployed service's version manifest.
    ClaimRequirementStateView:
      type: object
      required: [requirement, state]
      properties:
        requirement:
          type: string
          enum: [SYNTHETIC_ONLY, OFF, OPTIONAL, REQUIRED, SYNTHETIC_FALLBACK]
        state:
          type: string
          enum: [UNKNOWN, GRANTED, DENIED]
    ClaimsStateView:
      type: object
      required: [email, firstName, lastName, staticAvatar, animatedAvatar]
      properties:
        email:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        firstName:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        lastName:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        staticAvatar:
          $ref: "#/components/schemas/ClaimRequirementStateView"
        animatedAvatar:
          $ref: "#/components/schemas/ClaimRequirementStateView"
    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    RefreshResponse:
      type: object
      required: [accessToken, refreshToken, claims]
      properties:
        claims:
          $ref: "#/components/schemas/ClaimsStateView"
        accessToken:
          type: string
          description: Newly issued short-lived access token JWT.
        refreshToken:
          type: string
          description: Newly issued refresh token JWT; the presented token has been consumed.
    IntrospectRequest:
      type: object
      required: [accessToken]
      properties:
        accessToken:
          type: string
    IntrospectResponse:
      type: object
      required: [status, recommendedRecheckSeconds]
      properties:
        status:
          type: string
          enum: [active, revoked, expired, not_found]
        recommendedRecheckSeconds:
          type: integer
    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
    LogoutResponse:
      type: object
      required: [revoked]
      properties:
        revoked:
          type: boolean
    RevokeAllRequest:
      type: object
      required: [subject]
      properties:
        subject:
          type: string
          description: Application-visible sector subject (`sub`) for the account to revoke.
    RevokeAllResponse:
      type: object
      required: [revokedCount]
      properties:
        revokedCount:
          type: integer
    Error:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
        message:
          type: string
